services:
  mysql:
    image: mysql:8.0
    container_name: comanda-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-comanda_digital}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Porta não exposta ao host — o backend acessa via rede Docker (mysql:3306)
    networks:
      - comanda-net

  backend:
    build: ./backend
    container_name: comanda-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-comanda_digital}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - comanda-net

  frontend:
    build: ./frontend
    container_name: comanda-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - comanda-net

volumes:
  mysql_data:

networks:
  comanda-net:
    driver: bridge
